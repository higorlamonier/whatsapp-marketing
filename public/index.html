<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Marketing Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <h1>WhatsApp Marketing Control</h1>
    <p>Painel para campanhas, leads e descadastro com SQL + WhatsApp Cloud API.</p>

    <section class="stats" id="stats"></section>

    <section class="grid">
      <article class="card">
        <h3>Importar Contatos</h3>
        <form id="importForm">
          <textarea id="contactsJson" rows="8" placeholder='[{"fullName":"Maria", "phoneNumber":"11999999999", "category":"lancamento"}]'></textarea>
          <button type="submit">Importar</button>
        </form>
        <div id="importNotice" class="notice"></div>
      </article>

      <article class="card">
        <h3>Nova Campanha</h3>
        <form id="campaignForm">
          <input id="campaignName" placeholder="Nome da campanha" required />
          <input id="campaignCategory" placeholder="Categoria alvo" required />
          <input id="templateName" placeholder="Template Meta" required />
          <button type="submit">Criar Campanha</button>
        </form>
        <div id="campaignNotice" class="notice"></div>
      </article>

      <article class="card">
        <h3>Disparo</h3>
        <form id="sendForm">
          <input id="sendCampaignId" placeholder="ID da campanha" required />
          <input id="sendLimit" type="number" value="100" min="1" max="500" />
          <button type="button" class="secondary" id="prepareBtn">Preparar Lista</button>
          <button type="submit">Enviar Lote</button>
        </form>
        <div id="sendNotice" class="notice"></div>
      </article>
    </section>

    <section class="grid">
      <article class="card">
        <h3>Contatos Recentes</h3>
        <div id="contactsList" class="list"></div>
      </article>

      <article class="card">
        <h3>Campanhas Recentes</h3>
        <div id="campaignsList" class="list"></div>
      </article>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
